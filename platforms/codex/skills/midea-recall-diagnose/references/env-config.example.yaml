version: 1
notes:
  - "Copy this file to env-config.local.yaml before filling real URLs."
  - "Keep credentials, cookies, and tokens out of this file."
  - "Use browser login state instead of putting auth headers here."
  - "For multi-cluster prod, set es_console.cluster_routes and source_system_cluster_map_excel."
  - "sit/uat ES DSL uses Kibana console proxy; prod ES DSL uses Zhongli Cloud requestEs."

environments:
  sit:
    label: "SIT"
    search:
      base_url: "https://<sit-search-origin>"
      keyword_path: "/rag-recall/api/search/keyword"
      trace_record_info_path: "/rag-recall/api/search/trace/recordInfo"
      default_headers:
        appId: "<required>"
        appChannel: "<optional>"
    elk:
      discover_base_url: "https://<sit-elk-origin>/app/discover"
      api_base_url: "https://<sit-elk-origin>"
      api_endpoint_order:
        - "console_proxy"
        - "internal_search"
      index_pattern: "logstash*"
      default_time_range: "now-3d"
      target_search_hint: "\"<targetId>\" and \"TRACE_TARGET_ES\""
      cookie_browser: "chrome"
    es_console:
      transport: "kibana_console_proxy"
      console_base_url: "http://<sit-or-uat-kibana-host>:5601"
      cookie_browser: "chrome"

  uat:
    label: "UAT"
    search:
      base_url: "https://<uat-search-origin>"
      keyword_path: "/rag-recall/api/search/keyword"
      trace_record_info_path: "/rag-recall/api/search/trace/recordInfo"
      default_headers:
        appId: "<required>"
        appChannel: "<optional>"
    elk:
      discover_base_url: "https://<uat-elk-origin>/app/discover"
      api_base_url: "https://<uat-elk-origin>"
      api_endpoint_order:
        - "console_proxy"
        - "internal_search"
      index_pattern: "logstash*"
      default_time_range: "now-3d"
      target_search_hint: "\"<targetId>\" and \"TRACE_TARGET_ES\""
      cookie_browser: "chrome"
    es_console:
      transport: "kibana_console_proxy"
      console_base_url: "http://<sit-or-uat-kibana-host>:5601"
      cookie_browser: "chrome"

  prod:
    label: "PROD"
    search:
      base_url: "https://<prod-search-origin>"
      keyword_path: "/rag-recall/api/search/keyword"
      trace_record_info_path: "/rag-recall/api/search/trace/recordInfo"
      default_headers:
        appId: "<required>"
        appChannel: "<optional>"
    elk:
      discover_base_url: "https://<prod-elk-origin>/app/discover"
      api_base_url: "https://<prod-elk-origin>"
      api_endpoint_order:
        - "console_proxy"
        - "internal_search"
      index_pattern: "logstash*"
      default_time_range: "now-3d"
      target_search_hint: "\"<targetId>\" and \"TRACE_TARGET_ES\""
      cookie_browser: "chrome"
    es_console:
      transport: "zhongli_cloud_proxy"
      request_proxy_url: "https://<prod-console-api>/Elasticsearch/2024-01-11/dataRetrievales/requestEs"
      cookie_browser: "chrome"
      cookie_domain: "midea.com"
      source_system_cluster_map_excel: "来源系统索引.xlsx"
      source_system_cluster_map_sheet: "Sheet1"
      cluster_routes:
        集群1:
          page_url: "https://<prod-console-origin>/elasticsearch/instance/instance-menu/indexSearch?...&tab=DevelopmentTool"
          instance_id: "<instanceId>"
          region_id: "<regionId>"
          zone: "<zone>"
