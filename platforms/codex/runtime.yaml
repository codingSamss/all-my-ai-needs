platform: codex
runtime_version: 1

official_layout:
  skills_root: platforms/codex/skills
  runtime_root: ~/.codex
  notes:
    - 平台专属 skill 放到 platforms/codex/skills/<skill-name> 并包含 SKILL.md
    - repo 中可保留 runtime.yaml 供 AI 迁移时读取，但运行目录不下发
    - 平台级 runtime.yaml 仅供仓库内 AI 理解迁移规则，不同步到 ~/.codex 根目录

skill_runtime_contract:
  required_fields:
    - runtime_version
    - skill
    - platform
    - sync_paths
    - dependencies
    - manual_steps
    - verify
  optional_fields:
    - services
  notes:
    - 平台 skill 以 platforms/codex/skills 为准，不再单独维护 shared skill 真源
    - sync_paths 仅声明真正需要进入 ~/.codex/skills/<skill> 的文件或目录，保持最小同步面
    - platform 必须固定为 codex，避免跨平台说明混入
    - skill 级 runtime.yaml 只保留在 repo，不进入 ~/.codex/skills/<skill>/ 或 ~/.codex 根目录

managed_root_paths:
  - source: agents/
    target: ~/.codex/agents/
  - source: hooks/
    target: ~/.codex/hooks/
  - source: scripts/
    target: ~/.codex/scripts/
  - source: bin/
    target: ~/.codex/bin/

global_files:
  - source: config.toml
    target: ~/.codex/config.toml
    mode: local-managed
    note: config.toml（含 [projects]、provider 等本机状态）由各设备本地维护，仓库不同步、不覆盖本机；仓库版仅作去敏后的参考

dependencies:
  commands:
    - python3
    - rsync
  notes:
    - MCP 配置由仓库维护，但真实 token、headers、登录态仍需本机手动补齐

manual_steps:
  - 执行同步、提交、推送前，由读取仓库的 AI 比较 ~/.codex 与仓库受管全局配置的差异
  - 若本地有值得保留的新内容，先同步回仓库再继续；忽略 secrets、占位符和运行态噪音

verify:
  - ./scripts/sync_to_codex.sh --dry-run
