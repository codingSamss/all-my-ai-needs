runtime_version: 1
skill: playwright
platform: claude

sync_paths:
  - SKILL.md
  - runtime.yaml

dependencies:
  commands:
    - node
    - npm
    - npx
  mcp_servers:
    - playwright-ext

manual_steps:
  - 由 AI 同步时把 playwright-ext MCP 模板合并到 ~/.claude.json
  - 将 PLAYWRIGHT_MCP_EXTENSION_TOKEN 占位符替换为有效值

verify:
  - node --version
  - npm --version
  - npx --version
  - claude mcp list | rg "playwright-ext"
